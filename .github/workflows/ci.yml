name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Verify dist/ is up to date
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            echo "::error::dist/ is out of date. Run 'npm run build' and commit the result."
            git diff -- dist
            exit 1
          fi

  smoke-test-browser:
    name: Smoke test (browser driver, Wikipedia)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          origin: https://en.wikipedia.org
          time-limit: 10s
          output-path: bombadil-output
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bombadil-output-browser
          path: bombadil-output

  smoke-test-terminal:
    name: Smoke test (terminal driver, head)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          driver: terminal
          command: head -n 50

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  smoke-test-browser:
    name: Smoke test (browser driver, Wikipedia)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: ./
        with:
          origin: https://en.wikipedia.org
          time-limit: 10s
          output-path: bombadil-output
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bombadil-output-browser
          path: bombadil-output

  smoke-test-terminal:
    name: Smoke test (terminal driver, head)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: ./
        with:
          driver: terminal
          command: head -n 50

  publish-dist:
    name: Publish dist to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [smoke-test-browser, smoke-test-terminal]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: publish-dist-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Commit dist if changed
        run: |
          if [ -z "$(git status --porcelain dist)" ]; then
            echo "dist already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist
          git commit -m "chore: rebuild dist [skip ci]"
          git push
